<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time's Up! — CubbyCove</title>
    <meta name="description" content="Your screen time for today is all used up. See you tomorrow!">
    <link rel="icon" type="image/png" href="../images/closedlogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900;1000&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --purple: #7c3aed;
            --purple-light: #a78bfa;
            --orange: #f59e0b;
            --pink: #ec4899;
            --teal: #14b8a6;
        }

        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4c1d95 100%);
            position: relative;
        }

        /* ── Floating Stars ── */
        .star {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkle var(--dur, 3s) ease-in-out infinite alternate;
            opacity: 0.7;
        }
        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(0.8); }
            to   { opacity: 0.9; transform: scale(1.2); }
        }

        /* ── Floating blobs ── */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.25;
            pointer-events: none;
            animation: blobDrift var(--dur, 10s) ease-in-out infinite alternate;
        }
        @keyframes blobDrift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(30px, -20px) scale(1.1); }
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.12);
            border-radius: 2.5rem;
            padding: 3rem 2.5rem;
            max-width: 480px;
            width: calc(100% - 2rem);
            text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.15);
        }

        /* ── Moon Illustration ── */
        .moon-wrap {
            width: 140px;
            height: 140px;
            margin: 0 auto 2rem;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0px); }
            50%      { transform: translateY(-12px); }
        }
        .moon-circle {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #fde68a, #fbbf24);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            box-shadow: 0 0 60px rgba(251,191,36,0.5), 0 0 120px rgba(251,191,36,0.2);
        }
        .moon-zzz {
            position: absolute;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            color: white;
        }
        .moon-zzz.z1 { top: -10px; right: -5px;  font-size: 1.4rem; animation: floatZ 2s 0s   ease-in-out infinite; }
        .moon-zzz.z2 { top: -26px; right: 18px;  font-size: 1.1rem; animation: floatZ 2s 0.5s ease-in-out infinite; }
        .moon-zzz.z3 { top: -40px; right: 38px;  font-size: 0.9rem; animation: floatZ 2s 1s   ease-in-out infinite; }
        @keyframes floatZ {
            0%,100% { opacity: 0.4; transform: translateY(0) scale(0.9); }
            50%     { opacity: 1;   transform: translateY(-8px) scale(1.05); }
        }

        /* ── Text ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(251,191,36,0.15);
            border: 1.5px solid rgba(251,191,36,0.3);
            color: #fde68a;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 1.2rem;
        }

        h1 {
            color: white;
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 0.75rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        h1 span { color: #fbbf24; }

        .subtitle {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 2rem;
        }

        /* ── Reason Pill ── */
        .reason-box {
            background: rgba(255,255,255,0.08);
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            font-weight: 700;
        }
        .reason-box strong { color: white; }

        /* ── Tomorrow Countdown ── */
        .countdown-wrap {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .countdown-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .countdown-num {
            background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 1rem;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            color: white;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
        }
        .countdown-label {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
        }
        .countdown-sep {
            color: rgba(255,255,255,0.4);
            font-size: 2rem;
            font-weight: 900;
            align-self: center;
            margin-top: -20px;
        }

        /* ── CTA Buttons ── */
        .btn-primary {
            display: block;
            width: 100%;
            padding: 1rem;
            border-radius: 1.5rem;
            border: none;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 900;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
            margin-bottom: 0.75rem;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            box-shadow: 0 8px 24px rgba(124,58,237,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(124,58,237,0.5);
        }
        .btn-secondary {
            display: block;
            width: 100%;
            padding: 0.9rem;
            border-radius: 1.5rem;
            border: 1.5px solid rgba(255,255,255,0.15);
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            background: transparent;
            color: rgba(255,255,255,0.7);
            transition: all 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.08);
            color: white;
        }

        /* ── Stars confetti ── */
        .mini-star {
            position: absolute;
            pointer-events: none;
            font-size: 1.2rem;
            animation: starFall var(--d, 6s) linear var(--delay, 0s) infinite;
            opacity: 0;
        }
        @keyframes starFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.8; }
            90%  { opacity: 0.3; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 420px) {
            .card { padding: 2rem 1.5rem; border-radius: 2rem; }
            h1 { font-size: 2.2rem; }
            .countdown-num { width: 58px; height: 58px; font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <!-- Blobs -->
    <div class="blob" style="width:400px;height:400px;background:#7c3aed;top:-100px;left:-100px;--dur:12s;"></div>
    <div class="blob" style="width:350px;height:350px;background:#ec4899;bottom:-80px;right:-80px;--dur:9s;"></div>
    <div class="blob" style="width:250px;height:250px;background:#0ea5e9;top:40%;left:60%;--dur:15s;"></div>

    <!-- Stars background -->
    <script>
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            const size = Math.random() * 4 + 2;
            s.className = 'star';
            s.style.cssText = `
                width:${size}px; height:${size}px;
                background:${['#fff','#fde68a','#a78bfa','#67e8f9'][Math.floor(Math.random()*4)]};
                top:${Math.random()*100}%;
                left:${Math.random()*100}%;
                --dur:${2+Math.random()*4}s;
            `;
            document.body.appendChild(s);
        }
        // Drifting emoji stars
        const emojis = ['⭐','🌟','✨','💫','🌙'];
        for (let i = 0; i < 8; i++) {
            const m = document.createElement('div');
            m.className = 'mini-star';
            m.textContent = emojis[i % emojis.length];
            m.style.cssText = `left:${Math.random()*100}%;--d:${5+Math.random()*8}s;--delay:${Math.random()*6}s;`;
            document.body.appendChild(m);
        }
    </script>

    <!-- Main Card -->
    <div class="card" id="main-card">
        <!-- Moon -->
        <div class="moon-wrap">
            <div class="moon-circle" id="main-emoji">🌙</div>
            <span class="moon-zzz z1">z</span>
            <span class="moon-zzz z2">z</span>
            <span class="moon-zzz z3">z</span>
        </div>

        <div class="badge" id="reason-badge">⏰ Screen Time Over</div>

        <h1 id="main-title">Time's <span>Up!</span></h1>
        <p class="subtitle" id="main-subtitle">
            You've used all of today's screen time.<br>
            You did amazing — see you tomorrow! 🌟
        </p>

        <div class="reason-box" id="reason-details">
            Loading your time summary...
        </div>

        <!-- Countdown to Midnight -->
        <p style="font-size:0.75rem;font-weight:900;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:0.75rem;">Comes back in</p>
        <div class="countdown-wrap">
            <div class="countdown-unit">
                <div class="countdown-num" id="cd-hours">--</div>
                <div class="countdown-label">Hours</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
                <div class="countdown-num" id="cd-mins">--</div>
                <div class="countdown-label">Minutes</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
                <div class="countdown-num" id="cd-secs">--</div>
                <div class="countdown-label">Seconds</div>
            </div>
        </div>

        <!-- CTAs -->
        <a href="../index.html" class="btn-primary">
            🏠 Go to Home
        </a>
        <button class="btn-secondary" id="tell-parent-btn">
            👋 Tell a Parent
        </button>
    </div>

    <script>
        // ── Parse Reason from URL ────────────────────────────────
        (function () {
            const params = new URLSearchParams(window.location.search);
            const reason = params.get('reason') || 'allowance';
            const detail = params.get('detail') || '';

            const badgeEl    = document.getElementById('reason-badge');
            const titleEl    = document.getElementById('main-title');
            const subtitleEl = document.getElementById('main-subtitle');
            const detailsEl  = document.getElementById('reason-details');
            const emojiEl    = document.getElementById('main-emoji');
            const zElems     = document.querySelectorAll('.moon-zzz');

            if (reason === 'curfew') {
                badgeEl.textContent    = '🌙 Curfew Time';
                titleEl.innerHTML      = "Bedtime! <span>Sweet Dreams.</span>";
                subtitleEl.innerHTML   = "Your parent set a bedtime for you.<br>Rest up and come back tomorrow! 🌙💤";
                emojiEl.textContent    = '🌙';
                detailsEl.innerHTML    = `<strong>Curfew reached:</strong> Your bedtime is set to <strong>${detail || 'tonight'}</strong>. The portal will unlock when a new day begins.`;
                zElems.forEach(z => z.style.display = 'block');
            } else {
                // allowance
                badgeEl.textContent    = '⏰ Daily Limit Reached';
                titleEl.innerHTML      = "Time's <span>Up!</span>";
                subtitleEl.innerHTML   = "You've used all of today's screen time.<br>Awesome session — see you tomorrow! 🌟";
                emojiEl.textContent    = '⏰';
                detailsEl.innerHTML    = `<strong>Daily allowance used:</strong> You had <strong>${detail || 60} minutes</strong> of screen time today and you used them all up! Great job staying active.`;
                zElems.forEach(z => z.style.display = 'none');
            }
        })();

        // ── Countdown to Midnight ────────────────────────────────
        function updateCountdown() {
            const now = new Date();
            const midnight = new Date(now);
            midnight.setHours(24, 0, 0, 0);
            const diff = Math.max(0, midnight - now);

            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('cd-hours').textContent = String(h).padStart(2, '0');
            document.getElementById('cd-mins').textContent  = String(m).padStart(2, '0');
            document.getElementById('cd-secs').textContent  = String(s).padStart(2, '0');
        }
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // ── Tell a Parent ────────────────────────────────────────
        document.getElementById('tell-parent-btn').addEventListener('click', () => {
            // Show a friendly message overlay
            const overlay = document.createElement('div');
            overlay.style.cssText = `
                position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;
                background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
                font-family:'Nunito',sans-serif;
            `;
            overlay.innerHTML = `
                <div style="background:white;border-radius:2rem;padding:2.5rem 2rem;max-width:360px;width:90%;text-align:center;box-shadow:0 30px 80px rgba(0,0,0,0.3);">
                    <div style="font-size:3.5rem;margin-bottom:1rem;">📢</div>
                    <h2 style="font-size:1.4rem;font-weight:900;color:#1e1b4b;margin-bottom:0.5rem;">Hey Parent!</h2>
                    <p style="font-size:0.9rem;font-weight:700;color:#6b7280;line-height:1.5;margin-bottom:1.5rem;">
                        Your child's screen time is up for today.<br>
                        Their CubbyCove portal has been locked.<br><br>
                        You can review and update their time limits in the <strong style="color:#7c3aed;">Parent Dashboard</strong>.
                    </p>
                    <a href="../parent/dashboard.html" style="display:block;background:linear-gradient(135deg,#7c3aed,#a855f7);color:white;padding:0.9rem;border-radius:1.25rem;font-weight:900;text-decoration:none;margin-bottom:0.75rem;">
                        Open Parent Dashboard
                    </a>
                    <button onclick="this.closest('[style*=\"fixed\"]').remove()"
                        style="background:transparent;border:2px solid #e5e7eb;color:#6b7280;padding:0.75rem 2rem;border-radius:1.25rem;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;width:100%;">
                        Close
                    </button>
                </div>
            `;
            document.body.appendChild(overlay);
        });
    </script>
</body>
</html>
