<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CubbyCove - Games Arcade</title>
    <link rel="icon" type="image/png" href="../images/closedlogo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/kid_theme.css">
</head>

<body class="bg-gray-50 text-gray-800 antialiased overflow-x-hidden">

    <!-- TOP NAVIGATION BAR -->
    <nav class="fixed top-0 left-0 w-full bg-white shadow-md z-50 h-16 flex items-center justify-between px-4 lg:px-6">

        <!-- Left: Logo & Menu Toggle -->
        <div class="flex items-center gap-4">
            <button id="menu-btn"
                class="text-2xl text-gray-600 hover:text-cubby-blue p-2 rounded-full hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a href="home_logged_in.html" class="flex items-center gap-2 cursor-pointer">
                <div
                    class="bg-cubby-purple text-white p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-sm">
                    <i class="fa-solid fa-gamepad text-xl"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-cubby-purple hidden sm:block">
                    Cubby<span class="text-cubby-pink">Games</span>
                </span>
            </a>
        </div>

        <!-- Center: Search Bar -->
        <div class="flex-1 max-w-2xl mx-4 hidden sm:flex">
            <div class="relative w-full">
                <input type="text" placeholder="Search games..."
                    class="w-full bg-gray-100 border-2 border-transparent focus:border-cubby-purple focus:bg-white rounded-full py-2 pl-5 pr-12 outline-none transition-all placeholder-gray-400 font-semibold text-lg">
                <button
                    class="absolute right-0 top-0 h-full w-12 bg-gray-100 rounded-r-full text-gray-500 hover:text-cubby-purple hover:bg-gray-200 transition-colors border-l border-gray-200">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>

        <!-- Right: Profile & Actions -->
        <div class="flex items-center gap-3 sm:gap-5">
            <button class="sm:hidden text-xl text-gray-600"><i class="fa-solid fa-magnifying-glass"></i></button>

            <!-- User Profile -->
            <div class="flex items-center gap-3 cursor-pointer group">
                <span
                    class="hidden md:block font-bold text-gray-700 group-hover:text-cubby-blue hidden">Loading...</span>
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" alt="Avatar"
                        class="w-10 h-10 rounded-full bg-cubby-purple p-0.5 border-2 border-white shadow-sm transition-transform group-hover:scale-105">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full">
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <aside id="sidebar"
        class="fixed top-16 left-0 h-[calc(100vh-4rem)] w-64 bg-white overflow-y-auto transform lg:translate-x-0 -translate-x-full transition-all duration-300 ease-in-out z-40 pb-10 border-r border-gray-100 overflow-x-hidden">

        <!-- Main Links -->
        <div class="p-3 space-y-1">
            <a href="home_logged_in.html"
                class="flex items-center gap-4 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold text-lg transition-colors sidebar-link transition-all duration-300">
                <i class="fa-solid fa-house text-xl w-6 text-center text-cubby-blue"></i>
                <span
                    class="sidebar-label whitespace-nowrap inline-block overflow-hidden transition-all duration-300">Home</span>
            </a>
            <a href="games.html"
                class="flex items-center gap-4 px-4 py-3 bg-cubby-purple/10 text-cubby-purple rounded-xl font-bold text-lg sidebar-link transition-all duration-300">
                <i class="fa-solid fa-gamepad text-xl w-6 text-center"></i>
                <span
                    class="sidebar-label whitespace-nowrap inline-block overflow-hidden transition-all duration-300">Games</span>
            </a>
            <a href="chat.html"
                class="flex items-center gap-4 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold text-lg transition-colors sidebar-link transition-all duration-300">
                <i class="fa-solid fa-comments text-xl w-6 text-center text-cubby-green"></i>
                <span
                    class="sidebar-label whitespace-nowrap inline-block overflow-hidden transition-all duration-300">Chat</span>
            </a>
            <a href="#"
                class="flex items-center gap-4 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold text-lg transition-colors sidebar-link transition-all duration-300">
                <i class="fa-solid fa-heart text-xl w-6 text-center text-cubby-pink"></i>
                <span
                    class="sidebar-label whitespace-nowrap inline-block overflow-hidden transition-all duration-300">Favorites</span>
            </a>
        </div>

        <hr class="border-gray-200 mx-4 my-2">

        <!-- Game Categories -->
        <div class="p-4 sidebar-hide-mini transition-all duration-300 overflow-hidden">
            <h3 class="font-extrabold text-gray-400 uppercase text-xs mb-3 ml-1 tracking-wider sidebar-header">
                Categories</h3>
            <div class="space-y-1">
                <button
                    class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-50 font-bold text-gray-700 transition-colors sidebar-link">
                    <span
                        class="w-6 h-6 rounded bg-cubby-yellow/10 text-cubby-yellow flex items-center justify-center text-xs"><i
                            class="fa-solid fa-puzzle-piece"></i></span>
                    <span class="sidebar-label">Puzzle</span>
                </button>
                <button
                    class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-50 font-bold text-gray-700 transition-colors sidebar-link">
                    <span class="w-6 h-6 rounded bg-red-100 text-red-600 flex items-center justify-center text-xs"><i
                            class="fa-solid fa-car"></i></span>
                    <span class="sidebar-label">Racing</span>
                </button>
                <button
                    class="w-full text-left flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-50 font-bold text-gray-700 transition-colors sidebar-link">
                    <span
                        class="w-6 h-6 rounded bg-cubby-green/10 text-cubby-green flex items-center justify-center text-xs"><i
                            class="fa-solid fa-graduation-cap"></i></span>
                    <span class="sidebar-label">Educational</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- OVERLAY -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden lg:hidden"></div>

    <!-- MAIN CONTENT -->
    <main id="main-content" class="lg:ml-64 pt-16 min-h-screen transition-all duration-300 ease-in-out">

        <!-- Hero Banner (Featured Game) -->
        <div class="p-6 pb-2">
            <div class="relative w-full h-64 md:h-80 rounded-3xl overflow-hidden shadow-lg group cursor-pointer">
                <img src="https://img.freepik.com/free-vector/space-game-background-neon-landscape-alien-planet_107791-1634.jpg"
                    class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105">
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-6 md:p-8 text-white">
                    <span
                        class="bg-cubby-yellow text-gray-900 text-xs font-extrabold px-3 py-1 rounded-full mb-3 inline-block">FEATURED</span>
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-2">Space Explorer 3000</h2>
                    <p class="text-gray-300 text-sm md:text-base max-w-lg mb-4">Blast off into a galaxy of fun! Learn
                        about planets while dodging asteroids.</p>
                    <button onclick="playMemoryGame()"
                        class="bg-cubby-purple hover:bg-cubby-purple/80 text-white font-bold px-6 py-3 rounded-xl shadow-lg transition-transform transform hover:scale-105 flex items-center gap-2">
                        <i class="fa-solid fa-play"></i> Play Now
                    </button>
                </div>
            </div>
        </div>

        <!-- Game Grid -->
        <div class="px-6 py-2">
            <h2 class="flex items-center gap-3 text-2xl font-black text-gray-800 mb-4">
                <i class="fa-solid fa-shapes text-cubby-purple"></i> All Games
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">

                <!-- Game Card 1 -->
                <a href="../games/chromata/splash.html" class="block">
                <div
                    class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow cursor-pointer group h-full">
                    <div class="aspect-square bg-cubby-blue/10 relative overflow-hidden">
                        <div class="w-full h-full flex items-center justify-center text-4xl text-cubby-blue"><i
                                class="fa-solid fa-paintbrush"></i></div>
                        <div class="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center">
                            <div
                                class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg text-cubby-blue">
                                <i class="fa-solid fa-play text-xl pl-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 text-sm truncate">Color Splash</h3>
                        <p class="text-xs text-gray-500">Creative</p>
                    </div>
                </div>
                </a>

                <!-- Game Card 2 -->
                <a href="../games/memory_match/index.html" class="block">
                <div
                    class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow cursor-pointer group h-full">
                    <div class="aspect-square bg-cubby-pink/10 relative overflow-hidden">
                        <div class="w-full h-full flex items-center justify-center text-4xl text-cubby-pink"><i
                                class="fa-solid fa-shapes"></i></div>
                        <div class="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center">
                            <div
                                class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg text-cubby-pink">
                                <i class="fa-solid fa-play text-xl pl-1"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 text-sm truncate">Shape Matcher</h3>
                        <p class="text-xs text-gray-500">Puzzle</p>
                    </div>
                </div>
                </a>

                <!-- Game Card 3 -->
                <div
                    class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow cursor-pointer group">
                    <div class="aspect-square bg-red-100 relative overflow-hidden">
                        <div class="w-full h-full flex items-center justify-center text-4xl text-red-400"><i
                                class="fa-solid fa-car-side"></i></div>
                        <div class="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center">
                            <div
                                class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg text-cubby-pink">
                                <i class="fa-solid fa-play text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 text-sm truncate">Tiny Racers</h3>
                        <p class="text-xs text-gray-500">Racing</p>
                    </div>
                </div>

                <!-- Game Card 4 -->
                <div
                    class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow cursor-pointer group">
                    <div class="aspect-square bg-cubby-yellow/10 relative overflow-hidden">
                        <div class="w-full h-full flex items-center justify-center text-4xl text-cubby-yellow"><i
                                class="fa-solid fa-cookie-bite"></i></div>
                        <div class="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center">
                            <div
                                class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg text-cubby-yellow">
                                <i class="fa-solid fa-play text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 text-sm truncate">Cookie Clicker</h3>
                        <p class="text-xs text-gray-500">Casual</p>
                    </div>
                </div>

                <!-- Game Card 5 -->
                <div
                    class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow cursor-pointer group">
                    <div class="aspect-square bg-cubby-purple/10 relative overflow-hidden">
                        <div class="w-full h-full flex items-center justify-center text-4xl text-cubby-purple"><i
                                class="fa-solid fa-paintbrush"></i></div>
                        <div class="absolute inset-0 bg-black/20 hidden group-hover:flex items-center justify-center">
                            <div
                                class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg text-cubby-purple">
                                <i class="fa-solid fa-play text-xl"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-3">
                        <h3 class="font-bold text-gray-800 text-sm truncate">Coloring Book</h3>
                        <p class="text-xs text-gray-500">Creative</p>
                    </div>
                </div>

            </div>
    </main>

    <!-- Appwrite & Data -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script src="../js/appwrite_config.js"></script>
    <script src="../js/data_service.js"></script>

    <!-- Import Logic -->
    <script src="../js/sidebar-logic.js"></script>
    <script src="../js/kid_logic.js"></script>
</body>

</html>
