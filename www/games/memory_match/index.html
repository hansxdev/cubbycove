<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Cubby's Memory Match</title>
    <!-- Preload retro font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #003049; /* Deep Space Blue fallback */
            /* Prevent user selection for touch */
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        /* Ensure pixelated rendering on canvas */
        canvas {
            display: block;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
    <!-- Import Kaboom.js -->
    <script src="https://unpkg.com/kaboom@3000.1.17/dist/kaboom.js"></script>
    
    <!-- Load game script -->
    <script src="game.js"></script>
</body>
</html>
