<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - CubbyCove</title>
    <link rel="icon" type="image/png" href="images/closedlogo.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: { 'cubby-dark': '#1A1A2E', 'cubby-blue': '#4CC9F0', 'cubby-purple': '#7209B7' }
                }
            }
        }
    </script>
</head>

<body class="bg-cubby-dark h-screen flex items-center justify-center font-sans">

    <div class="w-full max-w-md p-8 bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-2xl">

        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-cubby-blue/20 rounded-full mb-3">
                <i class="fa-solid fa-shield-cat text-cubby-blue text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Staff Portal</h1>
            <p class="text-gray-400 text-sm mt-1">Authorized CubbyCove Personnel Only</p>
        </div>

        <form onsubmit="event.preventDefault(); window.handleStaffLogin(this.identifier.value, this.password.value)"
            class="space-y-5">

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">Staff ID or Email</label>
                <div class="relative">
                    <i class="fa-solid fa-id-badge absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="text" name="identifier" id="staffIdentifier"
                        placeholder="#STF-A1B2C3 or email@cubbycove.com"
                        onkeydown="if(event.shiftKey && event.key === '~') { event.preventDefault(); window.handleStaffLogin('power_user@cubbycove.com', 'password123'); }"
                        class="w-full bg-cubby-dark border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white placeholder-gray-600 focus:outline-none focus:border-cubby-blue focus:ring-1 focus:ring-cubby-blue transition-colors"
                        required autocomplete="username">
                </div>
                <p class="text-xs text-gray-600 mt-1 ml-1">Your Staff ID was shown when you claimed your account.</p>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase mb-2 ml-1">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="password" name="password" placeholder="••••••••"
                        class="w-full bg-cubby-dark border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-cubby-blue focus:ring-1 focus:ring-cubby-blue transition-colors"
                        required autocomplete="current-password">
                    <button type="button"
                        onclick="const p=this.previousElementSibling; p.type=p.type==='password'?'text':'password'; this.querySelector('i').className=p.type==='password'?'fa-solid fa-eye':'fa-solid fa-eye-slash';"
                        class="absolute right-4 top-3.5 text-gray-500 hover:text-gray-300">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-cubby-blue hover:bg-cyan-400 text-cubby-dark font-bold py-3 rounded-xl shadow-lg shadow-cubby-blue/20 transition-all transform active:scale-95">
                <i class="fa-solid fa-right-to-bracket mr-2"></i> Sign In
            </button>

            <div class="text-center space-y-3 pt-2">
                <a href="staff_claim.html"
                    class="block text-xs text-cubby-blue hover:text-cyan-300 font-bold transition-colors">
                    <i class="fa-solid fa-envelope-open-text mr-1"></i> First time? Claim your account →
                </a>
                <a href="index.html" class="block text-xs text-gray-600 hover:text-gray-400 transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Return to Main Site
                </a>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script src="js/appwrite_config.js"></script>
    <script src="js/data_service.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
