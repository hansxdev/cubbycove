<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal - CubbyCove</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        'cubby-dark': '#1A1A2E',
                        'cubby-blue': '#4CC9F0',
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-cubby-dark h-screen flex items-center justify-center">

    <div class="w-full max-w-md p-8 bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 shadow-2xl">

        <div class="text-center mb-8">
            <div class="inline-block p-3 bg-red-500/20 rounded-full mb-3">
                <i class="fa-solid fa-lock text-red-500 text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Restricted Access</h1>
            <p class="text-gray-400 text-sm mt-1">Authorized CubbyCove Personnel Only</p>
        </div>

        <form onsubmit="event.preventDefault(); window.handleStaffLogin(this.email.value, this.password.value)"
            class="space-y-6">

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Staff ID</label>
                <div class="relative">
                    <i class="fa-solid fa-id-badge absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="email" name="email" placeholder="admin@cubbycove.com"
                        class="w-full bg-cubby-dark border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-cubby-blue focus:ring-1 focus:ring-cubby-blue transition-colors"
                        required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 ml-1">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-4 top-3.5 text-gray-500"></i>
                    <input type="password" name="password" placeholder="••••••••"
                        class="w-full bg-cubby-dark border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-white focus:outline-none focus:border-cubby-blue focus:ring-1 focus:ring-cubby-blue transition-colors"
                        required>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-red-900/20 transition-all transform active:scale-95 mt-4">
                Verify Credentials
            </button>

            <div class="text-center mt-6">
                <a href="index.html" class="text-xs text-gray-500 hover:text-gray-300 transition-colors">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Return to Main Site
                </a>
            </div>

        </form>
    </div>

    <!-- Auth Logic -->
    <script src="js/data_service.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
