<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubbyChat - Safe Friends</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/kid_theme.css">

    <style>
        /* Chat Bubble Animations */
        .message-enter {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(10px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased overflow-hidden h-screen flex flex-col">

    <!-- TOP NAVIGATION BAR -->
    <nav class="bg-white shadow-md z-50 h-16 flex-shrink-0 flex items-center justify-between px-4 lg:px-6">

        <!-- Left: Logo & Menu Toggle -->
        <div class="flex items-center gap-4">
            <button id="menu-btn"
                class="text-2xl text-gray-600 hover:text-cubby-blue p-2 rounded-full hover:bg-gray-100 transition-colors">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a href="home_logged_in.html" class="flex items-center gap-2 cursor-pointer">
                <div
                    class="bg-cubby-green text-white p-2 rounded-full w-10 h-10 flex items-center justify-center shadow-sm">
                    <i class="fa-solid fa-comments text-xl"></i>
                </div>
                <span class="text-2xl font-extrabold tracking-tight text-gray-700 hidden sm:block">
                    Cubby<span class="text-cubby-green">Chat</span>
                </span>
            </a>
        </div>

        <!-- Center: Current Chat Info -->
        <div class="flex items-center gap-3">
            <div class="relative">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Annie"
                    class="w-10 h-10 rounded-full bg-gray-200 border-2 border-white shadow-sm">
                <span
                    class="absolute bottom-0 right-0 w-3 h-3 bg-cubby-green border-2 border-white rounded-full"></span>
            </div>
            <div class="hidden sm:block">
                <h3 class="font-bold text-gray-800 leading-tight">Annie</h3>
                <p class="text-xs text-cubby-green font-bold">Online</p>
            </div>
        </div>

        <!-- Right: Actions -->
        <div class="flex items-center gap-3">
            <button
                class="w-10 h-10 bg-red-100 text-red-500 rounded-full flex items-center justify-center hover:bg-red-200 transition-colors"
                title="Report Chat">
                <i class="fa-solid fa-flag"></i>
            </button>
            <a href="home_logged_in.html"
                class="w-10 h-10 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors">
                <i class="fa-solid fa-house text-lg"></i>
            </a>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden relative">

        <!-- SIDEBAR (Collapsible) -->
        <aside id="sidebar"
            class="absolute lg:relative top-0 left-0 h-full w-64 bg-white border-r border-gray-100 transform -translate-x-full lg:translate-x-0 transition-all duration-300 ease-in-out z-40 flex flex-col overflow-x-hidden">
            <div
                class="p-4 border-b border-gray-100 bg-gray-50 sidebar-hide-mini transition-all duration-300 overflow-hidden">
                <h3 class="font-extrabold text-gray-400 uppercase text-xs tracking-wider mb-2 sidebar-header">My Friends
                </h3>
                <!-- Search Friends -->
                <div class="relative">
                    <input type="text" placeholder="Search friends..."
                        class="w-full bg-white border border-gray-200 rounded-full py-1.5 pl-8 pr-4 text-sm focus:outline-none focus:border-cubby-green">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-2 text-gray-400 text-xs"></i>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-2 space-y-1">
                <!-- Active Friend -->
                <div
                    class="flex items-center gap-4 px-4 py-3 bg-cubby-green/10 rounded-xl cursor-pointer sidebar-link transition-all duration-300">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Annie"
                        class="w-10 h-10 rounded-full bg-white border border-gray-200">
                    <div
                        class="flex-1 min-w-0 sidebar-label whitespace-nowrap overflow-hidden transition-all duration-300">
                        <h4 class="font-bold text-gray-800 truncate">Annie</h4>
                        <p class="text-xs text-cubby-green font-semibold truncate">Typing...</p>
                    </div>
                </div>
                <!-- Other Friend -->
                <div
                    class="flex items-center gap-4 px-4 py-3 hover:bg-gray-50 rounded-xl cursor-pointer transition-colors sidebar-link transition-all duration-300">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Bob"
                        class="w-10 h-10 rounded-full bg-white border border-gray-200">
                    <div
                        class="flex-1 min-w-0 sidebar-label whitespace-nowrap overflow-hidden transition-all duration-300">
                        <h4 class="font-bold text-gray-700 truncate">Bobby</h4>
                        <p class="text-xs text-gray-400 truncate">Let's play Minecraft!</p>
                    </div>
                    <span
                        class="text-xs text-gray-300 sidebar-label whitespace-nowrap overflow-hidden transition-all duration-300">5m</span>
                </div>
                <!-- Other Friend -->
                <div
                    class="flex items-center gap-4 px-4 py-3 hover:bg-gray-50 rounded-xl cursor-pointer transition-colors sidebar-link transition-all duration-300">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Caitlyn"
                        class="w-10 h-10 rounded-full bg-white border border-gray-200">
                    <div
                        class="flex-1 min-w-0 sidebar-label whitespace-nowrap overflow-hidden transition-all duration-300">
                        <h4 class="font-bold text-gray-700 truncate">Caitlyn</h4>
                        <p class="text-xs text-gray-400 truncate">See you at school!</p>
                    </div>
                    <span
                        class="text-xs text-gray-300 sidebar-label whitespace-nowrap overflow-hidden transition-all duration-300">1h</span>
                </div>
            </div>
        </aside>

        <!-- OVERLAY -->
        <div id="overlay" class="fixed inset-0 bg-black bg-opacity-50 z-30 hidden lg:hidden"></div>

        <!-- CHAT AREA -->
        <main id="main-content"
            class="flex-1 flex flex-col bg-gray-50 relative w-full lg:w-auto transition-all duration-300 ease-in-out">

            <!-- Messages -->
            <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4">

                <!-- Date Separator -->
                <div class="text-center">
                    <span class="bg-gray-200 text-gray-500 text-xs font-bold px-3 py-1 rounded-full">Today</span>
                </div>

                <!-- Message (Friend) -->
                <div class="flex gap-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Annie"
                        class="w-8 h-8 rounded-full bg-white border border-gray-200 self-end mb-1">
                    <div
                        class="max-w-[75%] bg-white p-3 rounded-2xl rounded-bl-none shadow-sm text-gray-800 text-sm leading-relaxed">
                        Hi Felix! Do you want to play the math game? 🎮
                    </div>
                </div>

                <!-- Message (Me) -->
                <div class="flex gap-3 justify-end">
                    <div
                        class="max-w-[75%] bg-cubby-green p-3 rounded-2xl rounded-br-none shadow-md text-white text-sm leading-relaxed font-medium">
                        Yeah! I just finished my homework. 📚
                    </div>
                </div>

                <!-- Message (Friend) -->
                <div class="flex gap-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Annie"
                        class="w-8 h-8 rounded-full bg-white border border-gray-200 self-end mb-1">
                    <div
                        class="max-w-[75%] bg-white p-3 rounded-2xl rounded-bl-none shadow-sm text-gray-800 text-sm leading-relaxed">
                        Awesome! I'll wait for you in the lobby.
                    </div>
                </div>

            </div>

            <!-- Input Area -->
            <div class="bg-white p-3 sm:p-4 border-t border-gray-200 flex gap-2 items-end">
                <button
                    class="p-2 text-gray-400 hover:text-cubby-yellow transition-colors rounded-full hover:bg-gray-100">
                    <i class="fa-solid fa-face-smile text-xl"></i>
                </button>

                <div
                    class="flex-1 bg-gray-100 rounded-2xl flex items-center px-4 py-2 border-2 border-transparent focus-within:border-cubby-green focus-within:bg-white transition-all">
                    <input type="text" id="message-input" placeholder="Type a safe message..."
                        class="w-full bg-transparent border-none focus:ring-0 text-sm sm:text-base text-gray-700 placeholder-gray-400"
                        autocomplete="off">
                </div>

                <button id="send-btn"
                    class="p-3 bg-cubby-green hover:bg-cubby-green/80 text-white rounded-full shadow-lg shadow-cubby-green/20 transition-all transform active:scale-90 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </div>

            <!-- Safety Warning Toast (Hidden by default) -->
            <div id="safety-toast"
                class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-red-500 text-white px-6 py-3 rounded-full shadow-xl text-sm font-bold hidden flex items-center gap-2 animate-bounce">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>That message isn't nice! Please be kind.</span>
            </div>

        </main>
    </div>

    <!-- Import Logic -->
    <script src="../js/sidebar-logic.js"></script>
    <script src="../js/kid_logic.js"></script>
    <script src="../js/chat_logic.js"></script>
</body>

</html>
