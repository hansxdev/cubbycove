<svg width="100%" height="100%" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMax slice">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="mountain-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020202;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="horizon-haze" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#000000;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="grid-fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00ffff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#000000" />

  <rect x="0" y="0" width="100%" height="350" fill="url(#horizon-haze)" />

  <g fill="white" opacity="0.8">
    <circle cx="50" cy="50" r="1" /> <circle cx="200" cy="120" r="1.2" />
    <circle cx="450" cy="30" r="1.5" /> <circle cx="700" cy="80" r="1.1" />
    <circle cx="900" cy="40" r="1.3" /> <circle cx="800" cy="150" r="1" />
    <circle cx="150" cy="200" r="0.7" /> <circle cx="750" cy="250" r="0.6" />
    <g opacity="0.4">
      <circle cx="300" cy="80" r="0.5" /> <circle cx="500" cy="200" r="0.5" />
      <circle cx="700" cy="100" r="0.5" /> <circle cx="100" cy="280" r="0.5" />
      <circle cx="950" cy="180" r="0.5" />
    </g>
  </g>

  <g opacity="0.25" filter="url(#neon-glow)">
    <path d="M-50 350 
             L100 180 L250 350 
             L400 150 L600 350 
             L750 120 L900 350 
             L1050 200 L1100 350"
      stroke="#00ffff" stroke-width="0.5" fill="url(#mountain-fill)" />
  </g>

  <g opacity="0.5" filter="url(#neon-glow)">
    <path d="M-20 350 
             L80 280 L180 350 
             L300 250 L420 350 
             L550 260 L680 350 
             L800 240 L950 350"
      stroke="#00ffff" stroke-width="1.0" fill="url(#mountain-fill)" />
  </g>

  <g opacity="1.0" filter="url(#neon-glow)">
    <path d="M-10 350 
             L60 330 L120 350 
             L200 320 L280 350 
             L350 335 L420 350 
             L500 310 L580 350 
             L660 325 L740 350 
             L820 315 L900 350 
             L980 330 L1010 350"
      stroke="#00ffff" stroke-width="1.5" fill="url(#mountain-fill)" stroke-linejoin="round" />
  </g>

  <rect x="0" y="350" width="100%" height="150" fill="#000000" />

  <g filter="url(#neon-glow)">
    <path d="M 500 350 L -400 500
              M 500 350 L -100 500
              M 500 350 L 200 500
              M 500 350 L 500 500
              M 500 350 L 800 500
              M 500 350 L 1100 500
              M 500 350 L 1400 500"
      stroke="url(#grid-fade)" stroke-width="0.8" fill="none" opacity="0.8" />

    <path d="M 0 355 L 1000 355
              M 0 365 L 1000 365
              M 0 380 L 1000 380
              M 0 405 L 1000 405
              M 0 440 L 1000 440
              M 0 500 L 1000 500"
      stroke="url(#grid-fade)" stroke-width="0.8" fill="none" opacity="0.8" />
  </g>

  <g id="structure-container"></g>

  <line x1="0" y1="350" x2="1000" y2="350" stroke="#00ffff" stroke-width="3" filter="url(#neon-glow)" />
  <line x1="0" y1="350" x2="1000" y2="350" stroke="#00ffff" stroke-width="1.5" opacity="1" />

</svg>