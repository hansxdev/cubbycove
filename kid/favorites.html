<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CubbyCove - My Favorites</title>
    <link rel="icon" type="image/png" href="../images/closedlogo.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/tailwind-config.js"></script>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/kid_theme.css">
</head>

<body class="bg-gray-50 text-gray-800 antialiased overflow-x-hidden">

    <!-- TOP NAVIGATION BAR -->
    <nav class="fixed top-0 left-0 w-full bg-white shadow-md z-50 h-16 flex items-center justify-between px-4 lg:px-6">

        <!-- Left: Logo & Menu Toggle -->
        <div class="flex items-center gap-4">
            <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')"
                class="lg:hidden text-xl text-gray-600">
                <i class="fa-solid fa-bars"></i>
            </button>
            <a href="home_logged_in.html" class="flex items-center gap-2">
                <img src="../images/closedlogo.png" alt="CubbyCove Logo" class="h-9 w-auto">
                <span
                    class="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-cubby-blue to-cubby-purple bg-clip-text text-transparent hidden sm:block">CubbyCove</span>
            </a>
        </div>

        <!-- Right: Profile & Actions -->
        <div class="flex items-center gap-3 sm:gap-5">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="openKidSettingsModal()">
                <span class="hidden md:block font-bold text-gray-700 group-hover:text-cubby-blue">Loading...</span>
                <div class="relative">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" alt="Avatar"
                        class="w-10 h-10 rounded-full bg-cubby-blue p-0.5 border-2 border-white shadow-sm transition-transform group-hover:scale-105">
                    <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full">
                    </div>
                </div>
            </div>
            <button onclick="handleKidLogout()" class="text-gray-400 hover:text-red-500 text-sm ml-2" title="Log Out">
                <i class="fa-solid fa-right-from-bracket"></i>
            </button>
        </div>
    </nav>

    <!-- SIDEBAR -->
    <aside id="sidebar"
        class="fixed top-16 left-0 h-[calc(100vh-4rem)] w-64 bg-white overflow-y-auto transform lg:translate-x-0 -translate-x-full transition-all duration-300 ease-in-out z-40 pb-10 border-r border-gray-100 overflow-x-hidden">

        <div class="p-3 space-y-1">
            <a href="home_logged_in.html"
                class="flex items-center gap-4 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold text-lg transition-colors">
                <i class="fa-solid fa-house text-xl w-6 text-center"></i>
                <span>Home</span>
            </a>
            <a href="games.html"
                class="flex items-center gap-4 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold text-lg transition-colors">
                <i class="fa-solid fa-gamepad text-xl w-6 text-center text-cubby-orange"></i>
                <span>Games</span>
            </a>
            <a href="chat.html"
                class="flex items-center gap-4 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold text-lg transition-colors">
                <i class="fa-solid fa-comments text-xl w-6 text-center text-cubby-green"></i>
                <span>Chat</span>
            </a>
            <a href="favorites.html"
                class="flex items-center gap-4 px-4 py-3 bg-cubby-pink/10 text-cubby-pink rounded-xl font-bold text-lg">
                <i class="fa-solid fa-heart text-xl w-6 text-center"></i>
                <span>Favorites</span>
            </a>
            <a href="history.html"
                class="flex items-center gap-4 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl font-bold text-lg transition-colors">
                <i class="fa-solid fa-clock-rotate-left text-xl w-6 text-center text-cubby-purple"></i>
                <span>History</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="pt-16 lg:ml-64 min-h-screen">
        <div class="px-6 py-6">
            <!-- Header -->
            <div class="mb-6">
                <h1 class="text-3xl font-black text-gray-800 flex items-center gap-3">
                    <i class="fa-solid fa-heart text-cubby-pink"></i> My Favorites
                </h1>
                <p class="text-gray-500 font-semibold mt-1">Videos you've loved ❤️</p>
            </div>

            <!-- Favorites Grid -->
            <div id="favorites-video-list" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="col-span-full text-center py-12">
                    <i class="fa-solid fa-spinner fa-spin text-3xl text-cubby-pink"></i>
                    <p class="text-gray-400 font-semibold mt-2">Loading favorites...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Appwrite & Data -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.1"></script>
    <script src="../js/appwrite_config.js"></script>
    <script src="../js/data_service.js"></script>

    <!-- Import Logic -->
    <script src="../js/kid_logic.js"></script>
</body>

</html>
